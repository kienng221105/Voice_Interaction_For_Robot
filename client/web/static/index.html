<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vending Machine</title>
<style>
  :root {
    --bg-main: #0b0c10;
    --bg-shelf: #1f2833;
    --accent: #45a29e;
    --accent-bright: #66fcf1;
    --text-main: #c5c6c7;
    --text-bright: #ffffff;
    --danger: #ff1744;
    --success: #00e676;
    --font-main: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

  body {
    font-family: var(--font-main);
    background: var(--bg-main);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== HEADER ===== */
  .header {
    height: 60px;
    background: linear-gradient(90deg, #0b0c10, #1f2833);
    border-bottom: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    box-shadow: 0 4px 15px rgba(102, 252, 241, 0.1);
  }

  .header-logo {
    font-size: 24px;
    font-weight: 800;
    color: var(--accent-bright);
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
  }

  /* ===== MAIN DISPLAY ===== */
  .main-display {
    flex: 1;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 30px;
    overflow-y: auto;
    position: relative;
    background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
  }

  .shelf {
    background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.5) 100%);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid rgba(102, 252, 241, 0.1);
    box-shadow: inset 0 20px 40px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.4);
    position: relative;
  }

  .shelf::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 12px;
    background: linear-gradient(90deg, #1f2833, #45a29e, #1f2833);
    border-bottom-left-radius: 16px;
    border-bottom-right-radius: 16px;
    opacity: 0.8;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 20px;
    justify-items: center;
  }

  .product-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 150px;
    padding: 15px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    transition: all 0.3s ease;
    position: relative;
  }

  .product-item.active {
    background: rgba(102, 252, 241, 0.08);
    border: 1px solid var(--accent);
    box-shadow: 0 0 20px rgba(102, 252, 241, 0.2);
  }

  .product-image {
    width: 100px;
    height: 160px;
    object-fit: contain;
    filter: drop-shadow(0 15px 10px rgba(0,0,0,0.6));
    transition: transform 0.3s ease;
  }

  .product-item:hover .product-image {
    transform: translateY(-5px) scale(1.05);
  }

  .product-price {
    background: #000;
    color: var(--accent-bright);
    font-family: 'Courier New', Courier, monospace;
    font-size: 16px;
    font-weight: bold;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--accent);
    box-shadow: inset 0 0 10px rgba(102, 252, 241, 0.2);
  }

  .product-stock {
    font-size: 12px;
    color: var(--text-main);
  }

  .product-stock.out {
    color: var(--danger);
    font-weight: bold;
  }

  .stock-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: var(--danger);
    text-transform: uppercase;
    transform: rotate(-15deg);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .product-item.out-of-stock .stock-overlay { opacity: 1; }

  /* ===== BOTTOM BAR (CART) ===== */
  .bottom-bar {
    height: 100px;
    background: #0b0c10;
    border-top: 2px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
    z-index: 10;
  }

  .cart-display {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .cart-total-label {
    font-size: 18px;
    text-transform: uppercase;
    color: var(--text-main);
    letter-spacing: 1px;
  }

  .cart-total-amount {
    font-size: 36px;
    font-weight: 900;
    color: var(--success);
    font-family: 'Courier New', Courier, monospace;
    text-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
  }

  .cart-items {
    display: flex;
    gap: 15px;
    max-width: 400px;
    overflow-x: auto;
  }

  .cart-item-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    color: var(--text-bright);
    white-space: nowrap;
  }

  /* ===== MIC BUTTON (FLOATING) ===== */
  .mic-container {
    position: fixed;
    bottom: 120px;
    right: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 2000;
  }

  .mic-hint {
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--accent-bright);
    border: 1px solid var(--accent);
    opacity: 0.8;
  }

  .btn-mic {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1f2833, #0b0c10);
    border: 3px solid var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-bright);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(102, 252, 241, 0.2);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    outline: none;
  }

  .btn-mic svg { width: 36px; height: 36px; transition: all 0.3s; }

  .btn-mic:active { transform: scale(0.9); }

  .btn-mic.recording {
    background: var(--danger);
    border-color: #ff5252;
    color: white;
    box-shadow: 0 0 30px rgba(255, 23, 68, 0.6);
    animation: pulse-mic 1.5s infinite;
  }

  @keyframes pulse-mic {
    0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 23, 68, 0.5); }
    50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(255, 23, 68, 0.8); }
    100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 23, 68, 0.5); }
  }

  /* ===== QR PAYMENT MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .modal-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .qr-box {
    background: #1f2833;
    padding: 40px;
    border-radius: 24px;
    border: 2px solid var(--accent);
    box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 40px rgba(102, 252, 241, 0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    transform: translateY(50px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .modal-overlay.show .qr-box {
    transform: translateY(0);
  }

  .qr-title {
    font-size: 24px;
    color: var(--text-bright);
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .qr-image {
    width: 250px;
    height: 250px;
    background: white;
    padding: 10px;
    border-radius: 12px;
  }

  .btn-simulate {
    margin-top: 20px;
    padding: 16px 32px;
    background: linear-gradient(90deg, #45a29e, #66fcf1);
    color: #0b0c10;
    font-size: 18px;
    font-weight: 900;
    text-transform: uppercase;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(102, 252, 241, 0.3);
    transition: all 0.2s;
  }

  .btn-simulate:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 30px rgba(102, 252, 241, 0.5);
  }

  .btn-simulate:active {
    transform: scale(0.95);
  }

  /* Processing Indicator */
  .processing-overlay {
    position: fixed;
    inset: 0;
    background: rgba(11, 12, 16, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .processing-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .spinner {
    width: 60px;
    height: 60px;
    border: 5px solid rgba(102, 252, 241, 0.2);
    border-top-color: var(--accent-bright);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div class="header">
  <div class="header-logo">SMART VENDING</div>
  <div style="display:flex; gap:15px; align-items:center;">
    <div style="width:10px;height:10px;border-radius:50%;background:var(--success);box-shadow:0 0 10px var(--success);"></div>
    <span style="font-size:14px;color:var(--text-main);font-family:monospace" id="clock">00:00</span>
  </div>
</div>

<div class="main-display">
  <div class="shelf">
    <div class="products-grid" id="productsGrid">
      <!-- Injected via JS -->
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="cart-display">
    <div class="cart-total-label">TỔNG CỘNG:</div>
    <div class="cart-total-amount" id="cartTotal">0đ</div>
  </div>
  <div class="cart-items" id="cartItems">
    <span style="color:var(--text-main);font-style:italic">Vui lòng chọn đồ uống...</span>
  </div>
</div>

<div class="mic-container">
  <div class="mic-hint" id="micHint">Chạm để nói</div>
  <button class="btn-mic" id="btnMic" onclick="toggleMic()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="23"/>
      <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
  </button>
</div>

<!-- QR Payment Modal -->
<div class="modal-overlay" id="qrModal">
  <div class="qr-box" style="position: relative;">
    <button onclick="showQRModal(false)" style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; outline: none;">&times;</button>
    <div class="qr-title">THANH TOÁN QR</div>
    <div style="font-size:32px;font-weight:900;color:var(--accent-bright);font-family:'Courier New',monospace" id="qrAmount">0đ</div>
    
    <!-- QR Image Container -->
    <div id="qrImageContainer" style="margin: 20px 0; transition: all 0.3s ease;">
      <img id="qrImage" src="" class="qr-image" alt="QR Code" style="margin:0;">
    </div>
    
    <!-- Success Animation Container (Hidden by default) -->
    <div id="qrSuccessContainer" style="display:none; margin: 30px 0; flex-direction: column; align-items: center; justify-content: center;">
      <div style="font-size: 60px; color: #4ade80; margin-bottom: 10px;">✓</div>
      <div style="font-size: 20px; font-weight: bold; color: #4ade80;">Giao dịch thành công!</div>
    </div>
    
    <div id="qrStatusText" style="color:var(--text-main);font-size:16px;text-align:center; font-weight: bold; margin-bottom: 5px;">
      Đang chờ thanh toán...
    </div>
    <div id="qrTimer" style="color:var(--accent-primary);font-size:18px;font-weight:bold;text-align:center; margin-bottom: 15px; font-family:'Courier New',monospace;">
      05:00
    </div>
  </div>
</div>

<div class="processing-overlay" id="processingOverlay">
  <div class="spinner"></div>
</div>

<script>
// ==========================================
// STATE
// ==========================================
let inventory = {};
let cart = {};
let isRecording = false;
let sessionActive = false; // Persistent listening session
let socket = null;
let mediaRecorder = null;
let audioContext = null;
let scriptNode = null;
let analyserNode = null;
let audioStream = null;

// VAD State
let vadInterval = null;
let isSpeaking = false;
let silenceStart = null;
const SILENCE_THRESHOLD = 0.05; // Increased from 0.02 to avoid wind noise
const SILENCE_DURATION = 1500;

// Configuration
const CLOUD_WS_URL = "ws://127.0.0.1:8765"; 

// ==========================================
// INITIALIZATION
// ==========================================
async function init() {
  await fetchState();
  connectWS();
  updateClock();
  setInterval(updateClock, 30000);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

// ==========================================
// API & WEBSOCKET
// ==========================================
async function fetchState() {
  try {
    const res = await fetch("/api/state");
    const data = await res.json();
    inventory = data.inventory;
    cart = data.cart;
    renderProducts();
    renderCart();
  } catch (err) {
    console.error("Failed to fetch state:", err);
  }
}

async function executeCommand(intent, entities) {
  try {
    showProcessing(true);
    const res = await fetch("/api/execute", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ intent: intent, entities: entities })
    });
    const data = await res.json();
    if (data.status === "success") {
      inventory = data.state.inventory;
      cart = data.state.cart;
      renderProducts();
      renderCart();
      
      // UI Flow Intercepts based on Intent
      if (intent === 'payment') {
        showQRModal(true);
        // Keep session active so user can speak to cancel/modify
      } else if (intent === 'confirm') {
        showQRModal(false);
        // End session after successful dispensing
        sessionActive = false;
        updateMicUI();
      } else {
        // Only hide QR modal if the user actually modifies the order or cancels
        const modifierIntents = ['buy_product', 'add_product', 'remove_product', 'change_product', 'cancel'];
        if (modifierIntents.includes(intent)) {
          showQRModal(false);
        }
      }
    }
  } catch (err) {
    console.error("Failed to execute command:", err);
  } finally {
    showProcessing(false);
    // Auto-restart mic if session is still active
    if (sessionActive && !isRecording) {
      setTimeout(() => startRecording(), 800);
    }
  }
}

function connectWS() {
  socket = new WebSocket(CLOUD_WS_URL);
  socket.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      if (data.type === "result") {
        const intent = data.intent;
        const items = data.items || [];
        executeCommand(intent, {products: items});
      } else {
        console.warn("Backend returned non-result:", data);
        showProcessing(false);
        if (sessionActive && !isRecording) {
          setTimeout(() => startRecording(), 800);
        }
      }
    } catch(e) {
      console.error("WS Parse Error:", e);
      showProcessing(false);
      if (sessionActive && !isRecording) {
        setTimeout(() => startRecording(), 800);
      }
    }
  };
  socket.onclose = () => {
    setTimeout(connectWS, 3000);
  };
}

// ==========================================
// RENDERERS
// ==========================================
function renderProducts() {
  const container = document.getElementById('productsGrid');
  container.innerHTML = '';
  
  const IMAGES = {
    'coca': 'coca.webp',
    'pepsi': 'pepsi.jpg',
    'sting': 'sting.webp',
    'aquafina': 'aquafina.jpg'
  };

  Object.values(inventory).forEach(prod => {
    if (!prod.enabled) return;
    const outOfStock = prod.stock === 0;
    const imgSrc = `static/img/${IMAGES[prod.id] || prod.id + '.png'}`;
    
    const qtyInCart = cart[prod.id] || 0;
    const isActive = qtyInCart > 0;
    
    const div = document.createElement('div');
    div.className = `product-item ${outOfStock ? 'out-of-stock' : ''} ${isActive ? 'active' : ''}`;
    
    div.innerHTML = `
      <img src="${imgSrc}" class="product-image" alt="${prod.display_name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTYwIiBmaWxsPSIjNDVhMjllIiB2aWV3Qm94PSIwIDAgMTYgMTYiPjxwYXRoIGQ9Ik00LjI1IDEuNUExLjI1IDEuMjUgMCAwIDAgMyAyLjc1djEwLjVBMS4yNSAxLjI1IDAgMCAwIDQuMjUgMTQuN2g3LjVhMS4yNSAxLjI1IDAgMCAwIDEuMjUtMS4yNVYyLjc1QTEuMjUgMS4yNSAwIDAgMCAxMS43NSAxLjVoLTcuNXpNNyAxMWgxdjFoLTF2LTF6bTEtMnYtaDF2MWgxeiIvPjwvc3ZnPg=='">
      <div class="product-price">${prod.price.toLocaleString('vi-VN')}đ</div>
      <div class="product-stock ${outOfStock ? 'out' : ''}">Còn lại: ${prod.stock}</div>
      <div class="stock-overlay">HẾT HÀNG</div>
    `;
    container.appendChild(div);
  });
}

function renderCart() {
  const container = document.getElementById('cartItems');
  const totalEl = document.getElementById('cartTotal');
  
  container.innerHTML = '';
  let total = 0;
  let count = 0;

  Object.entries(cart).forEach(([pid, qty]) => {
    const prod = inventory[pid];
    if (!prod) return;
    count += qty;
    total += prod.price * qty;

    const div = document.createElement('div');
    div.className = 'cart-item-chip';
    div.textContent = `${prod.display_name} x${qty}`;
    container.appendChild(div);
  });

  if (count === 0) {
    container.innerHTML = '<span style="color:var(--text-main);font-style:italic">Vui lòng chọn đồ uống...</span>';
  }

  totalEl.textContent = total.toLocaleString('vi-VN') + 'đ';
}

// ==========================================
// PAYMENT FLOW (VietQR - MB Bank)
// ==========================================
const BANK_CODE = 'MB';
const ACCOUNT_NO = '0862223775';
let paymentPollInterval = null;
let countdownInterval = null;
let paymentTimeout = 300; // 5 minutes in seconds

async function showQRModal(show) {
  const modal = document.getElementById('qrModal');
  if (show) {
    // Calculate cart total
    let total = 0;
    Object.entries(cart).forEach(([pid, qty]) => {
      const prod = inventory[pid];
      if (prod) total += prod.price * qty;
    });
    
    // Fetch the server's generated orderRef & payOS QR code string
    try {
      const res = await fetch('/api/payment_status');
      const data = await res.json();
      const orderRef = data.order_ref || ('VM' + Date.now().toString().slice(-6));
      
      let qrUrl = '';
      if (data.qr_code_str) {
        // Use payOS official QR code string
        qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(data.qr_code_str)}`;
      } else {
        // Fallback to manual VietQR
        qrUrl = `https://img.vietqr.io/image/${BANK_CODE}-${ACCOUNT_NO}-compact.png?amount=${total}&addInfo=${orderRef}`;
      }
      
      document.getElementById('qrImage').src = qrUrl;
      document.getElementById('qrAmount').textContent = total.toLocaleString('vi-VN') + 'đ';
      
      // Reset UI state
      document.getElementById('qrImageContainer').style.display = 'block';
      document.getElementById('qrImage').style.opacity = '1';
      document.getElementById('qrSuccessContainer').style.display = 'none';
      document.getElementById('qrStatusText').textContent = 'Đang chờ giao dịch...';
      document.getElementById('qrStatusText').style.color = 'var(--text-main)';
      
      modal.classList.add('show');
      
      // Start polling for payment confirmation & countdown
      startPaymentCountdown();
      startPaymentPolling();
    } catch(e) {
      console.error(e);
    }
  } else {
    modal.classList.remove('show');
    stopPaymentPolling();
    stopPaymentCountdown();
  }
}

function startPaymentCountdown() {
  stopPaymentCountdown();
  paymentTimeout = 300; // Reset to 5 minutes
  updateTimerUI();
  
  countdownInterval = setInterval(() => {
    paymentTimeout--;
    updateTimerUI();
    
    if (paymentTimeout <= 0) {
      console.log("⏳ Hết thời gian chờ thanh toán.");
      stopPaymentCountdown();
      stopPaymentPolling();
      
      // Update UI to show expiration
      document.getElementById('qrStatusText').textContent = 'Mã QR đã hết hạn! Vui lòng thanh toán lại.';
      document.getElementById('qrStatusText').style.color = '#ff5252';
      document.getElementById('qrImage').style.opacity = '0.2';
      document.getElementById('qrTimer').textContent = '00:00';
      
      // Auto close after 3 seconds
      setTimeout(() => {
        showQRModal(false);
      }, 3000);
    }
  }, 1000);
}

function stopPaymentCountdown() {
  if (countdownInterval) {
    clearInterval(countdownInterval);
    countdownInterval = null;
  }
}

function updateTimerUI() {
  const mins = Math.floor(paymentTimeout / 60).toString().padStart(2, '0');
  const secs = (paymentTimeout % 60).toString().padStart(2, '0');
  document.getElementById('qrTimer').textContent = `${mins}:${secs}`;
}

function startPaymentPolling() {
  stopPaymentPolling(); // Clear any existing
  paymentPollInterval = setInterval(async () => {
    try {
      const res = await fetch('/api/payment_status');
      const data = await res.json();
      if (data.confirmed) {
        console.log("✅ Thanh toán được xác nhận tự động!");
        stopPaymentPolling();
        stopPaymentCountdown();
        
        // Show success UI
        document.getElementById('qrImageContainer').style.display = 'none';
        document.getElementById('qrSuccessContainer').style.display = 'flex';
        document.getElementById('qrStatusText').textContent = 'Đã nhận được tiền!';
        document.getElementById('qrStatusText').style.color = '#4ade80';
        document.getElementById('qrTimer').textContent = 'Hoàn tất';
        
        // Wait 2.5 seconds before closing modal and executing dispense
        setTimeout(() => {
          simulatePaymentSuccess(); 
        }, 2500);
      }
    } catch (err) {
      console.error("Poll error:", err);
    }
  }, 2000); // Check every 2 seconds
}

function stopPaymentPolling() {
  if (paymentPollInterval) {
    clearInterval(paymentPollInterval);
    paymentPollInterval = null;
  }
}

function simulatePaymentSuccess() {
  executeCommand('confirm', {products: []});
}

// ==========================================
// MIC UI HELPER
// ==========================================
function updateMicUI() {
  const btn = document.getElementById('btnMic');
  const hint = document.getElementById('micHint');
  if (sessionActive) {
    btn.classList.add('recording');
    hint.textContent = "Hãy nói gì đó...";
  } else {
    btn.classList.remove('recording');
    hint.textContent = "Chạm để nói";
  }
}

// ==========================================
// SMART MIC CUTOFF (VAD)
// ==========================================
function checkSilence() {
  if (!analyserNode || !isRecording) return;
  
  const dataArray = new Float32Array(analyserNode.fftSize);
  analyserNode.getFloatTimeDomainData(dataArray);
  
  let sumSquares = 0.0;
  for (let i = 0; i < dataArray.length; i++) {
    sumSquares += dataArray[i] * dataArray[i];
  }
  const rms = Math.sqrt(sumSquares / dataArray.length);
  
  if (rms > SILENCE_THRESHOLD) {
    isSpeaking = true;
    silenceStart = null;
    document.getElementById('micHint').textContent = "Đang lắng nghe...";
  } else {
    if (isSpeaking) {
      if (silenceStart === null) {
        silenceStart = Date.now();
      } else if (Date.now() - silenceStart > SILENCE_DURATION) {
        console.log("VAD: Silence detected, pausing mic for processing.");
        pauseRecording(); // Pause, don't end session
        return;
      }
    }
  }
  
  vadInterval = requestAnimationFrame(checkSilence);
}

async function startRecording() {
  if (!socket || socket.readyState !== WebSocket.OPEN) return;
  if (isRecording) return; // Already recording
  
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const source = audioContext.createMediaStreamSource(audioStream);
    
    analyserNode = audioContext.createAnalyser();
    analyserNode.fftSize = 512;
    source.connect(analyserNode);
    
    scriptNode = audioContext.createScriptProcessor(4096, 1, 1);
    scriptNode.onaudioprocess = (e) => {
      const inputData = e.inputBuffer.getChannelData(0);
      const pcmData = new Int16Array(inputData.length);
      for (let i = 0; i < inputData.length; i++) {
        let s = Math.max(-1, Math.min(1, inputData[i]));
        pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(pcmData.buffer);
      }
    };
    
    analyserNode.connect(scriptNode);
    scriptNode.connect(audioContext.destination);
    
    isRecording = true;
    isSpeaking = false;
    silenceStart = null;
    document.getElementById('btnMic').classList.add('recording');
    document.getElementById('micHint').textContent = "Hãy nói gì đó...";
    
    checkSilence();
  } catch (err) {
    console.error("Microphone error:", err);
  }
}

// pauseRecording: Tear down audio stream & send audio_end,
// but keep sessionActive = true so it auto-restarts.
function pauseRecording() {
  if (vadInterval) cancelAnimationFrame(vadInterval);
  if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
  if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
  if (audioContext) { audioContext.close(); audioContext = null; }
  if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
  
  if (socket && socket.readyState === WebSocket.OPEN) {
    socket.send(JSON.stringify({ type: "audio_end" }));
  }
  
  isRecording = false;
  // Keep sessionActive = true! Mic will restart after executeCommand finishes.
  document.getElementById('micHint').textContent = "Đang xử lý...";
  showProcessing(true);
}

// Full stop: End the entire session (user manually taps mic to stop)
function stopSession() {
  if (isRecording) {
    if (vadInterval) cancelAnimationFrame(vadInterval);
    if (scriptNode) { scriptNode.disconnect(); scriptNode = null; }
    if (analyserNode) { analyserNode.disconnect(); analyserNode = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); audioStream = null; }
    isRecording = false;
  }
  sessionActive = false;
  updateMicUI();
}

function toggleMic() {
  if (sessionActive) {
    // User wants to stop the session
    stopSession();
  } else {
    // User wants to start a new session
    sessionActive = true;
    startRecording();
  }
}

function showProcessing(show) {
  const overlay = document.getElementById('processingOverlay');
  if (show) overlay.classList.add('show');
  else overlay.classList.remove('show');
}

// Start
window.addEventListener('load', init);

</script>
